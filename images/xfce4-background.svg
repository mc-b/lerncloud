    </radialGradient>

    <radialGradient id="bottomLeft" cx="2%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#a1ebaa" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#a1ebaa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="2048" height="1152" fill="url(#base)"/>
  <rect width="2048" height="1152" fill="url(#topGlow)"/>
  <rect width="2048" height="1152" fill="url(#centerGreen)"/>
  <rect width="2048" height="1152" fill="url(#rightCyan)"/>
